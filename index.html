<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Faturas QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff5a;
    --accent2: #5affb8;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5a5a;
    --fuel: #5ab4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .badge-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    color: var(--muted);
  }

  /* ── CAMERA SECTION ── */
  .camera-section {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .viewfinder {
    position: relative;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4/3;
    border: 1px solid var(--border);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .viewfinder-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .qr-frame {
    width: 140px;
    height: 140px;
    position: relative;
  }

  .qr-frame::before, .qr-frame::after,
  .qr-frame span::before, .qr-frame span::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }
  .qr-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .qr-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .qr-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .qr-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  .camera-hint {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace;
  }

  #canvas { display: none; }

  .btn-capture {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }
  .btn-capture:active { opacity: 0.85; transform: scale(0.98); }
  .btn-capture:disabled { opacity: 0.4; cursor: not-allowed; }

  .camera-off-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    aspect-ratio: 4/3;
    background: var(--surface);
    border-radius: 16px;
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 13px;
  }
  .camera-off-state .icon { font-size: 32px; }

  .btn-start-cam {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-start-cam:hover { background: #2e2e2e; }

  /* ── PROCESSING STATE ── */
  .processing-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .processing-overlay.active { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── CONFIRM DIALOG ── */
  .confirm-dialog {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .confirm-dialog.active { display: flex; }

  .confirm-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 28px 20px 40px;
    width: 100%;
    max-width: 480px;
    border-top: 1px solid var(--border);
  }

  .confirm-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  .field-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .field-row {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 10px;
    min-width: 90px;
    letter-spacing: 0.06em;
  }
  .field-value {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 10px;
    outline: none;
    min-width: 0;
  }
  .field-value::placeholder { color: var(--muted); }

  .cat-selector { display: flex; gap: 8px; margin-bottom: 20px; }
  .cat-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .cat-btn.active-geral { background: rgba(232,255,90,0.12); border-color: var(--accent); color: var(--accent); }
  .cat-btn.active-comb  { background: rgba(90,180,255,0.12); border-color: var(--fuel);  color: var(--fuel);  }

  .designacao-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    outline: none;
    margin-bottom: 20px;
    appearance: none;
    -webkit-appearance: none;
  }

  .confirm-actions { display: flex; gap: 10px; }
  .btn-save {
    flex: 2;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-cancel {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  /* ── LISTA ── */
  .section-header {
    padding: 8px 20px 12px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .invoice-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .invoice-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }

  .card-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-geral { background: var(--accent); }
  .dot-comb  { background: var(--fuel); }

  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .card-desig {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-total {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .card-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 3px;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0.5;
  }
  .btn-delete:hover { opacity: 1; color: var(--danger); }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-state .icon { font-size: 28px; display: block; margin-bottom: 8px; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
  }

  .btn-export {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 12px;
    padding: 13px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s;
  }
  .btn-export:hover { background: var(--surface2); }
  .btn-export.fuel { color: var(--fuel); border-color: rgba(90,180,255,0.3); }
  .btn-export.geral { color: var(--accent); border-color: rgba(232,255,90,0.3); }



  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 20px;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ Faturas QR</div>
  <div class="badge-count" id="countBadge">0 faturas</div>
</header>



<!-- Camera section -->
<div class="camera-section">
  <div id="cameraOff" class="camera-off-state">
    <span class="icon">📷</span>
    <span>Câmara desligada</span>
    <button class="btn-start-cam" onclick="startCamera()">Iniciar câmara</button>
  </div>

  <div id="cameraOn" style="display:none; flex-direction:column; gap:12px;">
    <div class="viewfinder">
      <video id="video" autoplay playsinline muted></video>
      <div class="viewfinder-overlay">
        <div class="qr-frame"><span></span></div>
      </div>
      <div class="camera-hint">Aponte para o QR code e capture</div>
    </div>
    <canvas id="canvas"></canvas>
    <button class="btn-capture" id="btnCapture" onclick="captureAndAnalyze()">
      <span>⬤</span> Capturar QR Code
    </button>
  </div>
</div>

<!-- Invoice list -->
<div class="section-header">
  <span>Faturas registadas</span>
  <span id="monthLabel"></span>
</div>
<div class="invoice-list" id="invoiceList">
  <div class="empty-state">
    <span class="icon">◎</span>
    Nenhuma fatura ainda.<br>Aponte a câmara ao QR code da fatura.
  </div>
</div>

<!-- Processing overlay -->
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text">A ler o QR code...</div>
</div>

<!-- Confirm dialog -->
<div class="confirm-dialog" id="confirmDialog">
  <div class="confirm-sheet">
    <div class="confirm-title">✦ Confirmar fatura</div>

    <div class="field-group">
      <div class="field-row">
        <span class="field-label">Data</span>
        <input type="date" class="field-value" id="fData">
      </div>
      <div class="field-row">
        <span class="field-label">Total €</span>
        <input type="number" class="field-value" id="fTotal" step="0.01" placeholder="0.00">
      </div>
      <div class="field-row">
        <span class="field-label">IVA €</span>
        <input type="number" class="field-value" id="fIva" step="0.01" placeholder="0.00">
      </div>
      <div class="field-row">
        <span class="field-label">Nº Doc</span>
        <input type="text" class="field-value" id="fDoc" placeholder="FT 001/1234">
      </div>
      <div class="field-row">
        <span class="field-label">NIF</span>
        <input type="text" class="field-value" id="fNif" placeholder="123456789">
      </div>
    </div>

    <div class="cat-selector">
      <button class="cat-btn active-geral" id="btnGeral" onclick="setCategoria('geral')">Despesa Geral</button>
      <button class="cat-btn" id="btnComb" onclick="setCategoria('combustivel')">Combustível</button>
    </div>

    <select class="designacao-select" id="fDesig">
      <option value="Alimentação">Alimentação</option>
      <option value="Alojamento">Alojamento</option>
      <option value="Deslocação Sócio">Deslocação Sócio</option>
      <option value="Oferta Clientes">Oferta Clientes</option>
      <option value="Fardamento">Fardamento</option>
      <option value="Material Informático">Material Informático</option>
      <option value="Material de Escritório">Material de Escritório</option>
      <option value="Portagens">Portagens</option>
      <option value="Outro">Outro</option>
    </select>

    <div class="confirm-actions">
      <button class="btn-save" onclick="saveInvoice()">Guardar</button>
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Bottom export bar -->
<div class="bottom-bar">
  <button class="btn-export geral" onclick="exportExcel('geral')">↓ Despesas Gerais</button>
  <button class="btn-export fuel" onclick="exportExcel('combustivel')">↓ Combustível</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
const STORAGE_KEY = 'faturas_qr_v2';
const NIF_CACHE_KEY = 'faturas_nif_cache';

const FUEL_DESIGNACOES = ['combustivel','gasolina','gasóleo','bp','galp','repsol','prio','cepsa'];

let invoices = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let nifCache = JSON.parse(localStorage.getItem(NIF_CACHE_KEY) || '{}');
let currentCategoria = 'geral';

// ── API KEY ──
// API key não necessária — leitura local via BarcodeDetector

// Load saved key on init
window.addEventListener('load', () => {
  updateMonthLabel();
  renderList();
});

// ── CAMERA ──
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('cameraOff').style.display = 'none';
    document.getElementById('cameraOn').style.display = 'flex';
  } catch (e) {
    showToast('Erro: permissão de câmara negada');
  }
}

function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const maxW = 800;
  const scale = Math.min(1, maxW / video.videoWidth);
  canvas.width = Math.round(video.videoWidth * scale);
  canvas.height = Math.round(video.videoHeight * scale);
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.80).split(',')[1];
}

// ── BARCODE DETECTION (local, sem API) ──
let barcodeDetector = null;

async function initBarcodeDetector() {
  if (!('BarcodeDetector' in window)) {
    showToast('Este browser não suporta leitura de QR. Usa Chrome Android.');
    return false;
  }
  const formats = await BarcodeDetector.getSupportedFormats();
  if (!formats.includes('qr_code')) {
    showToast('QR code não suportado neste dispositivo.');
    return false;
  }
  barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
  return true;
}

async function captureAndAnalyze() {
  const btn = document.getElementById('btnCapture');
  const overlay = document.getElementById('processingOverlay');

  // Init detector if needed
  if (!barcodeDetector) {
    const ok = await initBarcodeDetector();
    if (!ok) return;
  }

  btn.disabled = true;
  overlay.classList.add('active');
  overlay.querySelector('.processing-text').textContent = 'A ler QR code...';

  try {
    const video = document.getElementById('video');

    // Try up to 5 frames rapidly for robustness
    let rawValue = null;
    for (let attempt = 0; attempt < 5; attempt++) {
      const barcodes = await barcodeDetector.detect(video);
      if (barcodes.length > 0) {
        rawValue = barcodes[0].rawValue;
        break;
      }
      await new Promise(r => setTimeout(r, 200));
    }

    overlay.classList.remove('active');
    btn.disabled = false;

    if (!rawValue) {
      showToast('QR não detectado — aproxima mais e tenta de novo');
      return;
    }

    // Parse ATCUD QR code format: CAMPO:VALOR*CAMPO:VALOR*...
    const parsed = parseATCUD(rawValue);
    openConfirm(parsed);

  } catch (e) {
    overlay.classList.remove('active');
    btn.disabled = false;
    showToast('Erro: ' + e.message);
    console.error(e);
  }
}

function parseATCUD(raw) {
  // Format: A:NIF*B:NIF*C:PT*D:FT*E:N*F:YYYYMMDD*G:FT X/N*H:ATCUD*...*N:IVA*O:TOTAL*P:HASH
  const fields = {};
  raw.split('*').forEach(part => {
    const idx = part.indexOf(':');
    if (idx > 0) {
      const key = part.substring(0, idx).trim();
      const val = part.substring(idx + 1).trim();
      fields[key] = val;
    }
  });

  // Parse date YYYYMMDD → YYYY-MM-DD
  let data = '';
  if (fields['F'] && fields['F'].length === 8) {
    data = fields['F'].substring(0,4) + '-' + fields['F'].substring(4,6) + '-' + fields['F'].substring(6,8);
  }

  return {
    nif:   fields['A'] || '',
    data:  data,
    doc:   fields['G'] || '',
    atcud: fields['H'] || '',
    total: parseFloat(fields['O']) || 0,
    iva:   parseFloat(fields['N']) || 0,
    tipo:  fields['D'] || '',
    raw:   raw
  };
}
// ── CONFIRM DIALOG ──
function openConfirm(data) {
  document.getElementById('fData').value = data.data || '';
  document.getElementById('fTotal').value = data.total || '';
  document.getElementById('fIva').value = data.iva || '';
  document.getElementById('fDoc').value = data.doc || '';
  document.getElementById('fNif').value = data.nif || '';

  // Auto-detect category from NIF cache
  const nif = data.nif || '';
  let cat = 'geral';
  if (nifCache[nif]) {
    cat = nifCache[nif].categoria;
    document.getElementById('fDesig').value = nifCache[nif].designacao || 'Alimentação';
  }
  setCategoria(cat);

  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('active');
}

function setCategoria(cat) {
  currentCategoria = cat;
  const btnG = document.getElementById('btnGeral');
  const btnC = document.getElementById('btnComb');
  const sel = document.getElementById('fDesig');

  btnG.className = 'cat-btn' + (cat === 'geral' ? ' active-geral' : '');
  btnC.className = 'cat-btn' + (cat === 'combustivel' ? ' active-comb' : '');

  if (cat === 'combustivel') {
    sel.innerHTML = '<option value="Combustível">Combustível</option>';
    sel.disabled = true;
  } else {
    sel.disabled = false;
    sel.innerHTML = [
      'Alimentação','Alojamento','Deslocação Sócio','Oferta Clientes',
      'Fardamento','Material Informático','Material de Escritório','Portagens','Outro'
    ].map(d => `<option value="${d}">${d}</option>`).join('');
  }
}

function saveInvoice() {
  const nif = document.getElementById('fNif').value.trim();
  const desig = document.getElementById('fDesig').value;

  const invoice = {
    id: Date.now(),
    data: document.getElementById('fData').value,
    total: parseFloat(document.getElementById('fTotal').value) || 0,
    iva: parseFloat(document.getElementById('fIva').value) || 0,
    doc: document.getElementById('fDoc').value.trim(),
    nif,
    categoria: currentCategoria,
    designacao: desig
  };

  // Update NIF cache
  if (nif) {
    nifCache[nif] = { categoria: currentCategoria, designacao: desig };
    localStorage.setItem(NIF_CACHE_KEY, JSON.stringify(nifCache));
  }

  invoices.push(invoice);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(invoices));
  closeConfirm();
  renderList();
  showToast('Fatura guardada ✓');
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('invoiceList');
  const count = document.getElementById('countBadge');
  count.textContent = invoices.length + (invoices.length === 1 ? ' fatura' : ' faturas');

  if (!invoices.length) {
    list.innerHTML = `<div class="empty-state"><span class="icon">◎</span>Nenhuma fatura ainda.<br>Aponte a câmara ao QR code da fatura.</div>`;
    return;
  }

  list.innerHTML = [...invoices].reverse().map(inv => `
    <div class="invoice-card">
      <div class="card-dot ${inv.categoria === 'combustivel' ? 'dot-comb' : 'dot-geral'}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-desig">${inv.designacao}</span>
          <span class="card-total">${inv.total.toFixed(2)}€</span>
        </div>
        <div class="card-meta">${inv.data || '—'} · ${inv.doc || '—'} · NIF ${inv.nif || '—'}</div>
      </div>
      <button class="btn-delete" onclick="deleteInvoice(${inv.id})">✕</button>
    </div>
  `).join('');
}

function deleteInvoice(id) {
  invoices = invoices.filter(i => i.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(invoices));
  renderList();
}

// ── EXPORT ──
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function updateMonthLabel() {
  const now = new Date();
  document.getElementById('monthLabel').textContent = MONTHS_PT[now.getMonth()] + ' ' + now.getFullYear();
}

function exportExcel(categoria) {
  const data = invoices.filter(i => i.categoria === categoria);
  if (!data.length) { showToast('Sem faturas nesta categoria'); return; }

  const now = new Date();
  const mesAno = MONTHS_PT[now.getMonth()] + ' ' + now.getFullYear();
  const isCombus = categoria === 'combustivel';

  const wb = XLSX.utils.book_new();
  const ws_data = [];

  if (isCombus) {
    ws_data.push(['Matrícula: 07-MH-76']);
    ws_data.push([]);
    ws_data.push(['Data', 'Designação', 'Nº Documento', 'NIF', 'Total c/IVA', 'IVA', 'Total s/IVA']);
    data.forEach(inv => {
      ws_data.push([inv.data, inv.designacao, inv.doc, inv.nif, inv.total, inv.iva, +(inv.total - inv.iva).toFixed(2)]);
    });
    ws_data.push([]);
    ws_data.push(['', '', '', 'Total', data.reduce((s,i) => s + i.total, 0).toFixed(2)]);
  } else {
    ws_data.push(['Data', 'Designação', 'Nº Documento', 'NIF', 'Total c/IVA', 'IVA', 'Total s/IVA']);
    data.forEach(inv => {
      ws_data.push([inv.data, inv.designacao, inv.doc, inv.nif, inv.total, inv.iva, +(inv.total - inv.iva).toFixed(2)]);
    });
    ws_data.push([]);
    ws_data.push(['', '', '', 'Total', data.reduce((s,i) => s + i.total, 0).toFixed(2)]);
  }

  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [14,20,18,14,14,10,14].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, mesAno);

  const filename = `${isCombus ? 'Combustivel' : 'Despesas'}_${mesAno.replace(' ', '_')}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('Excel exportado ✓');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
